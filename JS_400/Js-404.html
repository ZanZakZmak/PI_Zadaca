<html>
  <body></body>
  <script>
    /*Implementiraj funkciju za još napredniju pretragu koja prima pojam koji može sadržavati
    više riječi odvojenih razmakom. Funkcija traži indeks  prvog  studenta u listi koji zadovoljava sve
    tražene pojmove bilo imenom, prezimenom, gradom ili njihovom kombinacijom. Implementiraj
    traženu funkciju napredna_pretraga(pojam)  na način da prođu testovi (koristi se metoda
    console.assert  koja u slučaju nejednakosti baca grešku):*/

    let studenti = [
      {
        ime: "Marko",
        prezime: "Marković",
        grad: "Pula",
      },
      {
        ime: "Iva",
        prezime: "Ivić",
        grad: "Našice",
      },
      {
        ime: "Lucija",
        prezime: "Lucić",
        grad: "Zagreb",
      },
      {
        ime: "Nikola",
        prezime: "Nikolić",
        grad: "Rijeka",
      },
    ];

    function napredna_pretraga(lista, pojam) {
      // ... implementirati ovdje :)
      //odvojiti pojmove
      let pojam_lista = pojam.split(" ");
      //kroz studente
      for (let i = 0; i < lista.length; i++) {
        let status_student = true;
        //kroz pojmove
        for (let j = 0; j < pojam_lista.length; j++) {
          if (
            !(lista[i].ime.toLowerCase().search(pojam_lista[j]) == -1) ||
            !(lista[i].prezime.toLowerCase().search(pojam_lista[j]) == -1) ||
            !(lista[i].grad.toLowerCase().search(pojam_lista[j]) == -1)
          ) {
            status_student = true;
          } else {
            status_student = false;
          }
          //ako je status false ne moramo ići dalje jer treba sadržavati sve postojeće stringove
          if (!status_student) {
            break;
          }
        }
        //ako je status true onda vraćamo index (posto tražimo samo prvog)
        if (status_student) {
          return i;
        }
      }
    }

    console.assert(napredna_pretraga(studenti, "ma ić") == 0); // → prvi student
    console.assert(napredna_pretraga(studenti, "ko lić ri") == 3); // → zadnji student
    console.assert(napredna_pretraga(studenti, "ić za") == 2); // → treći student
    console.assert(napredna_pretraga(studenti, "ić ko la ri") == 3); // → zadnji student;s
  </script>
</html>
